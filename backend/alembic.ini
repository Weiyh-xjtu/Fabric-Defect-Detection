# ==============================================================================
# Alembic database migration configuration file
# ==============================================================================
# Sections:
#   [alembic]          - core config: migration script location, DB connection...
#   [post_write_hooks] - hooks run after a migration script is generated (e.g. formatting)
#   [loggers]          - logging config
#
# NOTE: keep this file ASCII-only. Alembic reads it with the OS locale encoding
# (GBK/cp936 on Chinese Windows), so non-ASCII comments break `alembic` commands
# with a UnicodeDecodeError. Chinese explanations live in alembic/env.py instead.
# ==============================================================================

# ======================== core config ========================
[alembic]
# path to migration scripts (relative to this config file)
script_location = alembic

# migration file name template. default: {revision}_{slug}.py
# uncomment below to prepend a timestamp:
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# path prepended to sys.path so project modules can be imported
prepend_sys_path = .

# timezone for dates rendered in migration files / filenames
# uncomment and set (e.g. Asia/Shanghai) to enable
# timezone =

# max length of the "slug" part of a migration filename
# truncate_slug_length = 40

# run the environment on `revision` even without --autogenerate
# revision_environment = false

# allow .pyc/.pyo files without a source .py to be detected as revisions
# sourceless = false

# version file locations (multiple dirs allowed, split by the separator below)
# defaults to alembic/versions
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# separator for version_locations
# "os" uses the OS default (":" on Linux/macOS, ";" on Windows)
version_path_separator = os

# recursively search version dirs for source files (Alembic 1.10+)
# recursive_version_locations = false

# output encoding for generated migration scripts
# output_encoding = utf-8

# ======================== database connection ========================
# format: postgresql://user:password@host:port/dbname
# NOTE: in production, override this via environment variables to avoid
# hard-coding credentials.
sqlalchemy.url = postgresql://rsod_admin:rsod_admin@localhost:5432/rsod_agent

# ======================== post write hooks ========================
# actions run after a migration script is generated (formatting, linting...)
[post_write_hooks]
# example: format with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# example: lint with ruff
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

# ======================== logging config ========================
[loggers]
# loggers: root, sqlalchemy, alembic
keys = root,sqlalchemy,alembic

[handlers]
# handlers: console (stderr output)
keys = console

[formatters]
# formatters: generic
keys = generic

# root logger
[logger_root]
level = WARN
handlers = console
qualname =

# SQLAlchemy logger
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# Alembic logger
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# console handler
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = DEBUG
formatter = generic

# generic formatter
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
