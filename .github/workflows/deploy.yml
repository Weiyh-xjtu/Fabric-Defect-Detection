# ═══════════════════════════════════════════════════════
# FIRESIGHT 一键部署（GitHub Actions）
#
# 触发方式：
#   1. push 到 development 分支（backend/frontend/deploy 有变更时）
#   2. Actions 页面手动触发（可勾选 force 忽略"训练进行中"保护）
#
# 敏感信息全部来自仓库 Secrets（Settings → Secrets and variables →
# Actions），仓库文件中不出现真实 IP/域名/密钥。所需 Secrets 见 README
# 或 deploy/DEPLOY.md 的"一键部署"章节。
# ═══════════════════════════════════════════════════════
name: Deploy

on:
  push:
    branches: [development]
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "忽略训练进行中的保护，强制部署"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # package-lock.json 未入库，用 npm install 而非 npm ci
      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
          tar -czf "$RUNNER_TEMP/firesight-dist.tar.gz" -C dist .

      - name: Check required secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DOMAIN: ${{ secrets.DOMAIN }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          missing=0
          for name in SSH_PRIVATE_KEY SERVER_HOST DOMAIN JWT_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::缺少 Secret: $name"
              missing=1
            fi
          done
          exit $missing

      # printf %q 转义，防止密钥中的特殊字符破坏 KEY=VALUE 格式
      - name: Render secrets env file
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_DIM: ${{ secrets.EMBEDDING_DIM }}
          FORCE_DEPLOY: ${{ inputs.force == true && '1' || '0' }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          out="$RUNNER_TEMP/firesight-secrets.env"
          : > "$out"
          for name in DOMAIN JWT_SECRET_KEY POSTGRES_PASSWORD MINIO_ROOT_USER \
                      MINIO_ROOT_PASSWORD QWEN_API_KEY QWEN_BASE_URL QWEN_MODEL \
                      EMBEDDING_API_KEY EMBEDDING_BASE_URL EMBEDDING_MODEL \
                      EMBEDDING_DIM FORCE_DEPLOY DEPLOY_BRANCH; do
            value="${!name}"
            [ -n "$value" ] && printf '%s=%q\n' "$name" "$value" >> "$out"
          done

      - name: Upload artifacts to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || 'root' }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" -o StrictHostKeyChecking=accept-new \
            "$RUNNER_TEMP/firesight-dist.tar.gz" \
            "$RUNNER_TEMP/firesight-secrets.env" \
            deploy/remote-deploy.sh \
            "$SERVER_USER@$SERVER_HOST:/tmp/"

      - name: Run remote deploy script
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || 'root' }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "DIST_TARBALL=/tmp/firesight-dist.tar.gz bash /tmp/remote-deploy.sh /tmp/firesight-secrets.env"
